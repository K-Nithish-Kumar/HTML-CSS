<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Styling</title>
</head>
<body>
    <!-- em - emphasis element which means italicize the content -->
    <h1>Font Styling Elements</h1>
    <h2>em</h2>
    <p>Read Books <em>Daily!</em></p>

    <!-- i - idiometic text element which also italicise the content -->
    <h2>i</h2>
    <p>Do <i>Yoga</i> Daily in the morning</p>

    <!-- Strong - which is used to indicate some serious or important situation -->
     <h2>strong</h2>
    <p>Can you drop me at the railway station because it's <strong>already late</strong> to catch my train?</p>

    <!-- b - bold tag used to bold the content -->
     <h2>b</h2>
     <p>My name is <b>Nithish Kumar</b></p>
    
</body>
</html>
