<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superscript & Subscript</title>
</head>
<body>
    <h1>Superscript & Subscript</h1>
    <!-- Superscript -->
     <p>It's my 20 <sup>th</sup> birthday</p>
    
    <!--Subscript-->
    <p>H<sub>2</sub>O</p>
</body>
</html>
