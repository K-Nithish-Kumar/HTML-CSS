<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!-- Unordered List -->
     <h1>List</h1>
     <h2>Grocery List</h2>
     <ul>
        <li>Sugar</li>
        <li>Milk</li>
        <li>Coffee Powder</li>
     </ul>

     <!-- Ordered List -->
      <h2>How to Bake a Cake</h2>
      <ol>
        <li>Preheat the oven</li>
        <li>Mix the flour, sugar, and eggs</li>
        <li>Pour the batter into a pan.</li>
        <li>Bake for 45 minutes (or until golden).</li>
      </ol>
</body>
</html>
